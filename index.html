<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>جمعيتنا</title>
  <style>
    :root{
      --bg:#081225;
      --card:#0f1c35;
      --card2:#132442;
      --text:#eef4ff;
      --muted:#aeb9d4;
      --line:rgba(255,255,255,.08);
      --blue:#5a95ff;
      --blue2:#78a9ff;
      --green:#1ec98a;
      --red:#ff6b79;
      --gold:#f0c85a;
      --shadow:0 18px 40px rgba(0,0,0,.35);
      --radius:22px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Tahoma,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top right, rgba(90,149,255,.18), transparent 24%),
        radial-gradient(circle at top left, rgba(30,201,138,.10), transparent 22%),
        linear-gradient(180deg,#06101f 0%, #09152a 100%);
      min-height:100vh;
    }

    .container{
      width:min(1100px,92%);
      margin:24px auto 50px;
    }

    .hero, .card{
      background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));
      border:1px solid var(--line);
      border-radius:28px;
      box-shadow:var(--shadow);
    }

    .hero{
      padding:24px;
    }

    h1{
      margin:0 0 8px;
      font-size:clamp(28px,4vw,42px);
    }

    .sub{
      margin:0;
      color:var(--muted);
      line-height:1.8;
      font-size:15px;
    }

    .top-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:18px;
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:12px;
      margin-top:18px;
    }

    @media (max-width:900px){
      .stats{grid-template-columns:repeat(2,1fr)}
    }

    .stat{
      background:rgba(255,255,255,.04);
      border:1px solid var(--line);
      border-radius:18px;
      padding:16px;
    }

    .stat .num{
      font-size:24px;
      font-weight:900;
      margin-bottom:4px;
    }

    .stat .label{
      font-size:13px;
      color:var(--muted);
    }

    .receiver-box{
      margin-top:18px;
      background:linear-gradient(135deg, rgba(240,200,90,.14), rgba(255,255,255,.03));
      border:1px solid rgba(240,200,90,.18);
      border-radius:20px;
      padding:18px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:14px;
      flex-wrap:wrap;
    }

    .receiver-title{
      color:#f7e3a7;
      font-size:14px;
      font-weight:700;
      margin-bottom:6px;
    }

    .receiver-name{
      font-size:26px;
      font-weight:900;
      color:#fff2c8;
    }

    .status{
      padding:10px 14px;
      border-radius:999px;
      font-size:13px;
      font-weight:800;
      border:1px solid transparent;
    }

    .status-open{
      background:rgba(255,107,121,.12);
      color:#ffd7dc;
      border-color:rgba(255,107,121,.22);
    }

    .status-done{
      background:rgba(30,201,138,.14);
      color:#d1f9e8;
      border-color:rgba(30,201,138,.22);
    }

    .layout{
      display:grid;
      grid-template-columns:1.05fr .95fr;
      gap:18px;
      margin-top:18px;
    }

    @media (max-width:980px){
      .layout{grid-template-columns:1fr}
    }

    .card{
      padding:18px;
    }

    .card h2{
      margin:0 0 16px;
      font-size:21px;
    }

    .card h3{
      margin:0 0 12px;
      font-size:17px;
    }

    .grid-2{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:12px;
    }

    @media (max-width:760px){
      .grid-2{grid-template-columns:1fr}
    }

    label{
      display:block;
      margin-bottom:8px;
      font-size:14px;
      font-weight:700;
      color:#dfe8ff;
    }

    input{
      width:100%;
      padding:14px;
      border-radius:15px;
      border:1px solid var(--line);
      outline:none;
      font-size:15px;
      color:var(--text);
      background:rgba(255,255,255,.05);
    }

    input::placeholder{color:#9aa9ca}

    .divider{
      height:1px;
      background:var(--line);
      margin:18px 0;
    }

    .member-add{
      display:grid;
      grid-template-columns:1fr 1fr auto;
      gap:10px;
    }

    @media (max-width:760px){
      .member-add{grid-template-columns:1fr}
    }

    .btn{
      border:none;
      cursor:pointer;
      border-radius:15px;
      padding:12px 18px;
      font-size:14px;
      font-weight:800;
      transition:.2s ease;
    }

    .btn:hover{transform:translateY(-1px)}
    .btn:active{transform:translateY(0)}

    .btn-blue{
      background:linear-gradient(135deg,var(--blue),var(--blue2));
      color:#fff;
    }

    .btn-soft{
      background:rgba(255,255,255,.06);
      color:var(--text);
      border:1px solid var(--line);
    }

    .btn-green{
      background:rgba(30,201,138,.14);
      color:#d4fcec;
      border:1px solid rgba(30,201,138,.22);
    }

    .btn-red{
      background:rgba(255,107,121,.12);
      color:#ffd7dc;
      border:1px solid rgba(255,107,121,.22);
    }

    .list{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin-top:10px;
    }

    .item{
      background:rgba(255,255,255,.04);
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px;
    }

    .item-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      flex-wrap:wrap;
    }

    .name{
      font-weight:900;
      font-size:16px;
    }

    .meta{
      color:var(--muted);
      font-size:13px;
      margin-top:4px;
      line-height:1.7;
    }

    .chips{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .chip{
      padding:7px 11px;
      border-radius:999px;
      font-size:12px;
      font-weight:900;
      border:1px solid transparent;
    }

    .chip-paid{
      background:rgba(30,201,138,.14);
      color:#d4fcec;
      border-color:rgba(30,201,138,.22);
    }

    .chip-unpaid{
      background:rgba(255,107,121,.12);
      color:#ffd7dc;
      border-color:rgba(255,107,121,.22);
    }

    .chip-receiver{
      background:rgba(240,200,90,.14);
      color:#ffefbf;
      border-color:rgba(240,200,90,.22);
    }

    .actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:12px;
    }

    .mini{
      border:none;
      cursor:pointer;
      padding:9px 12px;
      border-radius:12px;
      font-size:13px;
      font-weight:800;
    }

    .mini-gold{
      background:rgba(240,200,90,.14);
      color:#fff0bf;
      border:1px solid rgba(240,200,90,.22);
    }

    .mini-green{
      background:rgba(30,201,138,.14);
      color:#d4fcec;
      border:1px solid rgba(30,201,138,.22);
    }

    .mini-red{
      background:rgba(255,107,121,.12);
      color:#ffd7dc;
      border:1px solid rgba(255,107,121,.22);
    }

    .empty{
      text-align:center;
      padding:18px;
      color:var(--muted);
      background:rgba(255,255,255,.03);
      border:1px dashed var(--line);
      border-radius:16px;
    }

    .note{
      color:var(--muted);
      font-size:13px;
      line-height:1.8;
      margin-top:12px;
    }
  </style>
</head>
