<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>\u062c\u0645\u0639\u064a\u062a\u0646\u0627</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#070d1a; --surface:#0d1b33; --surface2:#112040;
  --border:rgba(99,145,255,0.13); --accent:#4f8aff; --accent2:#1de9b6;
  --gold:#ffc84a; --red:#ff5b6e; --green:#1de9b6; --text:#e8f0ff;
  --muted:#7a90c0; --radius:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* \u2500\u2500 screens \u2500\u2500 */
.screen{display:none;min-height:100vh}
.screen.active{display:block}
#screenPublic{background:radial-gradient(ellipse at 50% 0%,#0d2050 0%,var(--bg) 70%)}

/* \u2500\u2500 login \u2500\u2500 */
#screenLogin{display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 60% 30%,#1a2f5a 0%,#070d1a 70%)}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:48px 36px;width:100%;max-width:420px;text-align:center;box-shadow:0 40px 80px rgba(0,0,0,.6);animation:fadeUp .5s ease}
.login-icon{width:72px;height:72px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 24px;box-shadow:0 0 40px rgba(79,138,255,.4)}
.login-card h1{font-size:28px;font-weight:800;margin-bottom:8px}
.login-card>p{color:var(--muted);margin-bottom:28px;font-size:15px}

/* \u2500\u2500 inputs \u2500\u2500 */
.field{text-align:right;margin-bottom:14px}
.field label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px;font-weight:600}
input,select,textarea{width:100%;padding:12px 15px;background:#0a1428;border:1.5px solid rgba(79,138,255,.2);border-radius:12px;color:var(--text);font-family:'Tajawal',sans-serif;font-size:15px;transition:border-color .2s,box-shadow .2s;outline:none}
input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,138,255,.15)}
select option{background:#0d1b33}

/* \u2500\u2500 buttons \u2500\u2500 */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:12px 20px;border:none;border-radius:12px;font-family:'Tajawal',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:transform .15s,opacity .2s}
.btn:hover{transform:translateY(-1px)}.btn:active{transform:translateY(0);opacity:.85}
.btn-primary{background:linear-gradient(135deg,var(--accent),#2563eb);color:#fff;box-shadow:0 4px 20px rgba(79,138,255,.3);width:100%}
