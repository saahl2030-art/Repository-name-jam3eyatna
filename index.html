<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>جمعيتنا</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Tahoma, Arial, sans-serif;
      background: #0b1630;
      color: #ffffff;
    }

    .container {
      width: 92%;
      max-width: 900px;
      margin: 20px auto 40px auto;
    }

    .box {
      background: #12213f;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
    }

    h1, h2, h3 {
      margin-top: 0;
    }

    p {
      color: #c7d3ee;
      line-height: 1.8;
    }

    label {
      display: block;
      margin-bottom: 6px;
      margin-top: 12px;
      font-weight: bold;
      color: #e8efff;
    }

    input, select {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #2d426e;
      background: #0f1b34;
      color: #ffffff;
      font-size: 16px;
      box-sizing: border-box;
    }

    .btn {
      border: none;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
      margin-left: 6px;
      margin-bottom: 6px;
    }

    .btn-blue {
      background: #5d98ff;
      color: #ffffff;
    }

    .btn-green {
      background: #1fa96e;
      color: #ffffff;
    }
