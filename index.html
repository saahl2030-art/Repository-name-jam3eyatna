<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>جمعيتنا</title>
  <style>
    :root{
      --bg1:#07101f;
      --bg2:#0a1730;
      --card:#101c34;
      --card2:#13213d;
      --line:rgba(255,255,255,.08);
      --text:#edf3ff;
      --muted:#aeb9d3;
      --blue:#5d98ff;
      --blue2:#78abff;
      --green:#1ec98a;
      --red:#ff6b79;
      --gold:#f0c85a;
      --shadow:0 12px 30px rgba(0,0,0,.28);
      --radius:20px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Tahoma,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top right, rgba(93,152,255,.18), transparent 25%),
        radial-gradient(circle at top left, rgba(30,201,138,.08), transparent 22%),
        linear-gradient(180deg,var(--bg1),var(--bg2));
      min-height:100vh;
    }

    .wrap{
      width:min(960px, 92%);
      margin:20px auto 50px;
    }

    .card{
      background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow);
      padding:18px;
      margin-bottom:16px;
    }

    h1{
      margin:0 0 8px;
      font-size:34px;
    }

    h2{
      margin:0 0 14px;
      font-size:22px;
    }

    h3{
      margin:0 0 12px;
      font-size:18px;
    }

    p{
      margin:0;
      line-height:1.8;
      color:var(--muted);
    }

    .actions-top{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:16px;
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:12px;
      margin-top:18px;
    }

    @media (max-width:800px){
      .stats{grid-template-columns:repeat(2,1fr);}
    }

    @media (max-width:520px){
      .stats{grid-template-columns:1fr;}
    }

    .stat{
      background:rgba(255,255,255,.04);
      border:1px solid var(--line);
      border-radius:18px;
      padding:16px;
    }

    .stat .num{
      font-size:28px;
      font-weight:900;
      margin-bottom:6px;
    }

    .stat .label{
      color:var(--muted);
      font-size:14px;
    }

    .receiver{
      margin-top:16px;
      background:linear-gradient(135deg, rgba(240,200,90,.14), rgba(255,255,255,.02));
      border:1px solid rgba(240,200,90,.18);
      border-radius:18px
